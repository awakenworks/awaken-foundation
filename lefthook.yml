# Git hooks, installed via `pnpm hooks:install`.
#
# awaken-foundation is the open, permissively-licensed base tier. The checks
# mirror the family standard; the dependency guardrail (xtask) additionally
# enforces that no foundation crate depends on a product/component above it.

pre-commit:
  parallel: true
  commands:
    rustfmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    secrets:
      run: python3 scripts/ci/check_secrets.py {staged_files}
    doc-links:
      glob: "*.md"
      run: python3 scripts/ci/check_doc_links.py {staged_files}
    root-docs:
      run: python3 scripts/ci/check_root_docs.py {staged_files}
    hidden-unicode:
      run: python3 scripts/ci/check_hidden_unicode.py {staged_files}
    file-length:
      run: python3 scripts/ci/check_file_length.py --staged
    adr:
      glob: "docs/adr/*.md"
      run: python3 scripts/ci/check_adr.py {staged_files}
    adr-immutability:
      glob: "docs/adr/*.md"
      run: python3 scripts/ci/check_adr_immutability.py --self-test && python3 scripts/ci/check_adr_immutability.py --staged
    migrations:
      run: python3 hooks/check_migrations.py --self-test && python3 hooks/check_migrations.py --staged

pre-push:
  parallel: false
  commands:
    clippy:
      run: cargo clippy --workspace --all-targets -- -D clippy::correctness
    guardrails:
      run: cargo run -p xtask -- guardrail-lints
    file-length:
      run: python3 scripts/ci/check_file_length.py --self-test && python3 scripts/ci/check_file_length.py
    migrations:
      run: python3 hooks/check_migrations.py --audit
    test:
      run: cargo test --workspace

commit-msg:
  commands:
    commit-shape:
      run: python3 scripts/ci/check_commit_shape.py {1}

post-rewrite:
  commands:
    commit-shape:
      run: 'true # rebased commits are validated on the next push'
